<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mitosis</title>
  <script>
    // SPA fallback for GitHub Pages.
    // GitHub Pages doesn't support client-side routing, so unknown paths return this 404 page.
    //
    // Behavior:
    // 1. If path is /auth/callback → preserve OAuth code, redirect to /
    // 2. If path matches /apps/{name}/ → pass app name to SPA as query param (public viewing)
    // 3. Otherwise → redirect to / for the main SPA

    var path = window.location.pathname;
    var search = window.location.search;

    if (path === '/auth/callback' || path === '/auth/callback/') {
      // OAuth callback: preserve the authorization code before redirecting to /
      var params = new URLSearchParams(search);
      var code = params.get('code');
      if (code) {
        sessionStorage.setItem('mitosis_oauth_code', code);
        sessionStorage.setItem('mitosis_oauth_redirect', '1');
      }
      // Preserve any PKCE verifier already in sessionStorage
      window.location.replace('/');
    } else if (path.match(/^\/apps\/[^\/]+\/$/)) {
      // App path: serve the public SPA with app context
      // The SPA will show the gallery focused on this app
      var appName = path.split('/')[2];
      var target = '/?app=' + encodeURIComponent(appName);
      window.location.replace(target);
    } else {
      // All other paths: serve the main SPA
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Loading...</p>
</body>
</html>
