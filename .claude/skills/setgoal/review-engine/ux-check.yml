name: UX Check

on:
  issue_comment:
    types: [created]

jobs:
  ux-check:
    # 仅在 PR 评论包含 /ux-check 时触发
    if: github.event.issue.pull_request != '' && contains(github.event.comment.body, '/ux-check')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Preview
        run: npx vite preview --port 4173 &
        env:
          PORT: 4173

      - name: Wait for preview
        run: npx wait-on http://localhost:4173

      - name: Run UX Review
        run: |
          COMMAND="${{ github.event.comment.body }}"
          MODE="incremental"
          if [[ "$COMMAND" == *"full"* ]]; then
            MODE="full"
          fi

          echo "Running UX review in $MODE mode"

          bash .claude/skills/setgoal/review-engine/verifiers/ux-review.sh $MODE
        env:
          BASE_URL: http://localhost:4173/

      - name: Upload report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.claude/skills/setgoal/review-engine/output/report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));

            let body = `## UX Review Results\n\n`;
            body += `**Mode:** ${report.mode}\n`;
            body += `**Overall Score:** ${report.overall_score ?? 'N/A'}/100\n`;
            body += `**Verdict:** ${report.verdict}\n`;

            if (report.recommendation) {
              body += `**Recommendation:** ${report.recommendation}\n`;
            }

            body += `\n### Scores\n\n`;
            body += `| Dimension | Score | Weight |\n`;
            body += `|-----------|-------|--------|\n`;
            for (const [dim, data] of Object.entries(report.scores)) {
              body += `| ${dim} | ${data.score ?? 'N/A'} | ${data.weight} |\n`;
            }

            if (report.next_actions && report.next_actions.length > 0) {
              body += `\n### Top Issues\n\n`;
              report.next_actions.forEach(action => {
                body += `- ${action}\n`;
              });
            }

            body += `\n*Report generated at ${report.timestamp}*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-report-${{ github.event.issue.number }}
          path: .claude/skills/setgoal/review-engine/output/
          retention-days: 30
