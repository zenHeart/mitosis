<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mitosis</title>
  <script>
    // SPA fallback for GitHub Pages.
    // GitHub Pages doesn't support client-side routing, so any path like /auth/callback
    // returns this 404 page. We preserve OAuth data before redirecting to the SPA root.

    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;

    if (path === '/auth/callback' || path === '/auth/callback/') {
      // PKCE flow: code is in query params
      var params = new URLSearchParams(search);
      var code = params.get('code');
      if (code) {
        sessionStorage.setItem('mitosis_oauth_code', code);
        sessionStorage.setItem('mitosis_oauth_redirect', '1');
      }
    }

    // Redirect to the SPA root, preserving the hash fragment
    // (needed for Implicit Flow: token is in #access_token=...)
    var target = '/';
    if (hash) {
      target += hash;
    }
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
