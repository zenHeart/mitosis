name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build platform
        run: npm run build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

      - name: Build apps
        run: |
          for app_dir in apps/*/; do
            [ -d "$app_dir" ] || continue
            for ver_dir in "$app_dir"v*/; do
              [ -d "$ver_dir" ] || continue
              [ -f "$ver_dir/package.json" ] || continue
              echo "Building $(basename "$app_dir") $(basename "$ver_dir")..."
              cd "$ver_dir"
              npm ci --silent 2>/dev/null || npm install --silent 2>/dev/null || true
              npm run build 2>&1 | tail -1
              cd ../..
            done
          done

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          # Copy built apps (exclude node_modules, only copy actual app dist dirs)
          if [ -d apps ]; then
            find apps -type d -name dist -not -path "*/node_modules/*" -exec sh -c '
              dest="deploy/$(dirname "$1")"
              mkdir -p "$dest"
              cp -r "$1"/* "$dest/"
            ' _ {} \;
          fi
          # CNAME is already in dist if tracked, or add it
          echo "mitosis.zenheart.site" > deploy/CNAME
          echo "Deploy contents:"
          find deploy -type f | sort | head -20

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
