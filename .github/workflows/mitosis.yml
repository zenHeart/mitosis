name: Mitosis Build

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  build:
    if: |
      contains(github.event.issue.labels.*.name, 'app/') ||
      contains(github.event.issue.labels.*.name, 'build')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Parse app name and version
        id: parse
        env:
          ISSUE_LABELS: ${{ github.event.issue.labels }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$ISSUE_NUMBER" != "" ] && [ "$ISSUE_LABELS" != "" ]; then
            APP_NAME=$(echo "$ISSUE_LABELS" | grep -oP 'app/\K[^"]+' | head -1)
            if [ -z "$APP_NAME" ]; then
              APP_NAME=$(echo "$ISSUE_TITLE" | sed 's/build: //; s/ v.*//')
            fi
          else
            APP_NAME="unknown"
          fi
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

          EXISTING=$(ls apps/$APP_NAME/ 2>/dev/null | grep -c '^v' || echo "0")
          if [ "$EXISTING" -eq 0 ]; then
            NEXT_VERSION="v0"
          else
            NEXT=$(($(ls apps/$APP_NAME/ | grep '^v' | sed 's/v//' | sort -n | tail -1) + 1))
            NEXT_VERSION="v$NEXT"
          fi
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Run Agent Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.STEP_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.stepfun.com/step_plan
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          claude -p \
            --model step-3.7-flash \
            --allowed-tools "Read,Write,Edit,Bash" \
            --max-turns 50 \
            --output-format text \
            "$(cat worker/prompt.txt)"

      - name: Commit and push
        env:
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"
          if [ -d "apps/$APP_NAME/$NEXT_VERSION" ]; then
            git add apps/$APP_NAME/$NEXT_VERSION/
            git commit -m "feat: build $APP_NAME $NEXT_VERSION (issue #${{ github.event.issue.number }})"
            git push origin master
          else
            echo "No app directory created, skipping commit"
          fi

      - name: Close issue
        if: ${{ github.event.issue.number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "✅ ${{ steps.parse.outputs.app_name }} ${{ steps.parse.outputs.version }} 构建完成！\n\n访问: https://mitosis.zenheart.site/apps/${{ steps.parse.outputs.app_name }}/"
