name: Mitosis Build

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to build for (required for manual trigger)'
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    # timeout-minutes 在 GitHub Actions 中不保证强制终止运行中的进程
    # 超时保护由 scripts/claude-timeout.py 的 watchdog 线程提供（SIGKILL）

    steps:
      - name: Authorize IssueOps request
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          AUTHORIZED=false
          NEEDS_APPROVAL=false
          REASON=""

          # workflow_dispatch 手动触发：仅允许仓库 owner
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$ACTOR" = "$REPO_OWNER" ]; then
              AUTHORIZED=true
              REASON="Repository owner triggered manual workflow_dispatch."
            else
              NEEDS_APPROVAL=true
              REASON="Manual workflow_dispatch requires repository owner."
            fi
          elif [ "$EVENT_NAME" = "issue_comment" ] && ! echo "$COMMENT_BODY" | grep -qi '/create'; then
            REASON="Comment does not contain /create."
          elif [ "$ACTOR" = "$REPO_OWNER" ] && echo "$COMMENT_BODY" | grep -qi '/create'; then
            AUTHORIZED=true
            REASON="Repository owner triggered /create."
          else
            NEEDS_APPROVAL=true
            REASON="External IssueOps request requires repository owner approval."
          fi

          echo "authorized=$AUTHORIZED" >> "$GITHUB_OUTPUT"
          echo "needs_approval=$NEEDS_APPROVAL" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "::debug::Final authorize: AUTHORIZED=$AUTHORIZED NEEDS_APPROVAL=$NEEDS_APPROVAL REASON=$REASON"

          # 确定 ISSUE_NUMBER：workflow_dispatch 用 input，issue_comment 用 event
          if [ -n "$INPUT_ISSUE_NUMBER" ]; then
            echo "issue_number=$INPUT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ -n "$EVENT_ISSUE_NUMBER" ]; then
            echo "issue_number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

          if [ "$NEEDS_APPROVAL" = "true" ] && [ -n "$EVENT_ISSUE_NUMBER" ]; then
            gh issue comment "$EVENT_ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "🔒 Mitosis did not run the Agent Loop. External issues or comments require repository owner approval. In the current workflow, the repository owner must comment \`/create\` on an issue that has an \`app/{name}\` or \`platform\` label."
          else
            echo "$REASON"
          fi

          # ── 清理残留的 status:building 标签（被取消的 run 可能遗留）──
          RESOLVED_ISSUE_NUMBER="${INPUT_ISSUE_NUMBER:-$EVENT_ISSUE_NUMBER}"
          if [ "$AUTHORIZED" = "true" ] && [ -n "$RESOLVED_ISSUE_NUMBER" ]; then
            BUILDING_LABELS=$(gh issue view "$RESOLVED_ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$BUILDING_LABELS" | grep -q '^status:building$'; then
              echo "::debug::Removing stale status:building label from previous cancelled run."
              gh issue edit "$RESOLVED_ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:building" >/dev/null 2>&1 || true
            fi
            echo "dedup_skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "dedup_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Parse app name and version
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.auth.outputs.issue_number }}
        run: |
          # 使用 gh CLI 获取 label 名称列表（可靠）
          LABEL_NAMES=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null || true)

          # 检查是否有 platform label → 平台构建模式
          if echo "$LABEL_NAMES" | grep -q '^platform$'; then
            echo "is_platform=true" >> "$GITHUB_OUTPUT"
            echo "app_name=platform" >> "$GITHUB_OUTPUT"
            echo "version=root" >> "$GITHUB_OUTPUT"
          else
            echo "is_platform=false" >> "$GITHUB_OUTPUT"
            APP_NAME=$(echo "$LABEL_NAMES" | grep '^app/' | sed 's/^app\///' | head -1 || true)
            if [ -z "$APP_NAME" ]; then
              echo "app_name=unknown" >> "$GITHUB_OUTPUT"
              echo "version=v0" >> "$GITHUB_OUTPUT"
              gh issue comment "$ISSUE_NUMBER" \
                --repo "${{ github.repository }}" \
                --body "⚠️ Mitosis did not start a build because this issue has no \`app/{name}\` label and no \`platform\` label. Add an explicit label before approving or running \`/create\`."
              exit 0
            fi
            echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

            LATEST=$(find "apps/$APP_NAME" -maxdepth 1 -type d -name 'v[0-9]*' 2>/dev/null | sed 's#.*/v##' | sort -n | tail -1)
            if [ -z "$LATEST" ]; then
              NEXT_VERSION="v0"
            else
              NEXT=$((LATEST + 1))
              NEXT_VERSION="v$NEXT"
            fi
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Agent Loop
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' && steps.parse.outputs.app_name != 'unknown' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.STEP_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.stepfun.com/step_plan
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ steps.auth.outputs.issue_number }}
          IS_PLATFORM: ${{ steps.parse.outputs.is_platform }}
        run: |
          ensure_label() {
            gh label create "$1" --repo "${{ github.repository }}" --color "$2" --description "$3" --force >/dev/null 2>&1 || true
          }

          ensure_label "status:building" "1f6feb" "Mitosis Agent Loop is building"
          ensure_label "status:verifying" "fbca04" "Mitosis verifier is running"
          ensure_label "status:review" "0e8a16" "Human review required"
          ensure_label "status:failed" "b60205" "Mitosis Agent Loop failed"
          ensure_label "owner-approved" "5319e7" "Reserved approval label; current workflow still requires owner /create"

          set_status() {
            STATUS_LABEL="$1"
            MESSAGE="$2"
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:building" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:verifying" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:review" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:failed" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_LABEL"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "$MESSAGE"
          }

          cleanup() {
            # 杀掉可能残留的 vite preview 等后台进程
            pkill -f "vite preview" 2>/dev/null || true
            pkill -f "npx vite" 2>/dev/null || true
          }
          trap cleanup EXIT

          if [ "$IS_PLATFORM" = "true" ]; then
            set_status "status:building" "🔨 状态：平台构建中。Mitosis 正在根据 Issue 规格修改平台本身。"
          else
            set_status "status:building" "🔨 状态：构建中。Mitosis 正在根据 Issue 规格生成 $APP_NAME $NEXT_VERSION。"
          fi

          # 根据平台/应用选择 prompt 模板
          if [ "$IS_PLATFORM" = "true" ]; then
            BASE_PROMPT=$(sed \
              -e "s/__APP_NAME__/platform/g" \
              -e "s/__NEXT_VERSION__/root/g" \
              -e "s/__ISSUE_NUMBER__/${{ steps.auth.outputs.issue_number }}/g" \
              worker/prompt-platform.txt)
          else
            BASE_PROMPT=$(sed \
              -e "s/__APP_NAME__/${{ steps.parse.outputs.app_name }}/g" \
              -e "s/__NEXT_VERSION__/${{ steps.parse.outputs.version }}/g" \
              -e "s/__ISSUE_NUMBER__/${{ steps.auth.outputs.issue_number }}/g" \
              worker/prompt.txt)
          fi

          # Save the original commit before the agent loop starts
          ORIGINAL_SHA=$(git rev-parse HEAD)

          FEEDBACK=""
          PASSED=0

          for ATTEMPT in 1 2 3; do
            echo "Agent attempt $ATTEMPT/3"
            PROMPT_FILE="/tmp/mitosis-prompt-$ATTEMPT.txt"
            printf "%s\n\n%s\n" "$BASE_PROMPT" "$FEEDBACK" > "$PROMPT_FILE"
            echo "::debug::Prompt file size: $(wc -c < "$PROMPT_FILE") bytes"
            echo "::debug::Claude version: $(claude --version 2>&1)"
            echo "::debug::Node version: $(node --version)"
            echo "::debug::ANTHROPIC_API_KEY set: $([ -n "$ANTHROPIC_API_KEY" ] && echo "yes" || echo "no")"

            # 同时捕获 stdout + stderr，因为 claude 把 budget/turn 错误写到 stdout
            CLAUDE_LOG="/tmp/mitosis-claude-log-$ATTEMPT.log"
            if ! python3 scripts/claude-timeout.py 900 -- claude -p \
              --model step-3.7-flash \
              --permission-mode bypassPermissions \
              --max-budget-usd 10 \
              --allowed-tools "Read,Write,Edit,Bash" \
              --max-turns 10 \
              --output-format text \
              "$(cat "$PROMPT_FILE")" &>>"$CLAUDE_LOG"; then
              CLAUDE_EXIT=$?
            fi
            echo "::debug::Claude exit code: $CLAUDE_EXIT"
            echo "::debug::Claude log (last 5 lines): $(tail -5 "$CLAUDE_LOG" 2>/dev/null || echo 'empty')"

            # claude -p 在 --max-budget-usd / --max-turns 超出时仍 exit 0
            # 错误写到 stdout，所以检查合并日志
            if [ "$CLAUDE_EXIT" -eq 0 ] && grep -qiE "budget limit exceeded|reached max turns|max turns exceeded|budget.*exceeded" "$CLAUDE_LOG" 2>/dev/null; then
              echo "::warning::Claude reached budget/turn limit but exited 0 — treating as failure"
              CLAUDE_EXIT=1
            fi

            if [ "$CLAUDE_EXIT" -ne 0 ]; then
              if [ "$IS_PLATFORM" = "true" ]; then
                FEEDBACK="Previous Claude Code run failed before verification. Re-read the Issue and produce valid platform changes before stopping."
              else
                FEEDBACK="Previous Claude Code run failed before verification. Re-read the Issue and produce a valid app in apps/$APP_NAME/$NEXT_VERSION before stopping."
              fi
              continue
            fi

            if [ "$IS_PLATFORM" = "true" ]; then
              # 平台构建：验证根目录有变更（比较 agent 提交后的 HEAD 与最初的 ORIGINAL_SHA）
              if git diff --quiet "$ORIGINAL_SHA"; then
                FEEDBACK="Previous verifier failed: no platform changes were made. Modify platform files (src/, docs/, .github/, worker/, .claude/) and commit them."
                continue
              fi
            else
              if [ ! -d "apps/$APP_NAME/$NEXT_VERSION" ]; then
                FEEDBACK="Previous verifier failed: apps/$APP_NAME/$NEXT_VERSION was not created. Create that exact directory and all required files."
                continue
              fi
            fi

            set_status "status:verifying" "🔎 状态：验证中。正在运行 verifier（attempt $ATTEMPT/3），通过前不会创建审查 PR。"

            if [ "$IS_PLATFORM" = "true" ]; then
              # 平台构建验证：typecheck + build + 安全扫描 + 功能检查
              pushd . >/dev/null
              if npm run typecheck > /tmp/mitosis-verify.log 2>&1 && npm run build >> /tmp/mitosis-verify.log 2>&1; then
                echo "Typecheck + build passed, running security verifier..."
                # 安全扫描：检查 token/secret 泄露
                SECURITY_FAILURES=""
                SECURITY_SUMMARY=""

                # S1: 硬编码密钥检查
                if rg -i "(ghp_|gho_|github_pat_|sk-|AKIA|password|secret|api_key)\s*[:=]\s*['\"][^'\"]{4,}" src/ .github/ worker/ -g '!*.md' 2>/dev/null; then
                  SECURITY_FAILURES="${SECURITY_FAILURES}  - S1: 发现硬编码密钥/token\n"
                fi

                # S2: DOMPurify on* 事件检查 — 仅检查 ALLOWED_ATTR 白名单（FORBID_ATTR 含 on* 是正确行为）
                if awk '/ALLOWED_ATTR *= *\[/{f=1} f{print} /\]/{if(f)f=0}' src/composables/useSanitize.ts 2>/dev/null | grep -qi "onclick\|onerror\|onload\|onmouse"; then
                  SECURITY_FAILURES="${SECURITY_FAILURES}  - S2: DOMPurify ALLOWED_ATTR 白名单包含 on* 事件\n"
                fi

                # S3: CI Owner 门控检查 - 验证 workflow 中有 owner 授权逻辑
                # 检查 1: env var 中包含 ${{ github.event.issue.user.login }} 或 ${{ github.event.comment.user.login }}
                # 检查 2: bash 逻辑中有 [ "$ACTOR" = "$REPO_OWNER" ] 比较
                S3_FAIL=""
                if ! rg '\$\{\{\s*github\.event\.(issue|comment)\.user\.login' .github/workflows/mitosis.yml 2>/dev/null | grep -v "Security verifier" >/dev/null; then
                  S3_FAIL="${S3_FAIL}  - S3a: workflow 中缺少 comment/issue 作者 env var\n"
                fi
                if ! rg '\$ACTOR.*\$REPO_OWNER' .github/workflows/mitosis.yml 2>/dev/null | grep -v "Security verifier" >/dev/null; then
                  S3_FAIL="${S3_FAIL}  - S3b: workflow 中缺少 ACTOR=REPO_OWNER 授权比较\n"
                fi
                if [ -n "$S3_FAIL" ]; then
                  SECURITY_FAILURES="${SECURITY_FAILURES}${S3_FAIL}"
                fi

                # S4: localStorage 敏感存储检查
                if rg "localStorage.*(token|secret|password|api_key)" src/ -i 2>/dev/null | grep -v "// "; then
                  SECURITY_FAILURES="${SECURITY_FAILURES}  - S4: localStorage 可能存储敏感信息\n"
                fi

                if [ -n "$SECURITY_FAILURES" ]; then
                  echo "Security verifier FAILED:"
                  echo "$SECURITY_FAILURES"
                  FEEDBACK=$(printf "Security verifier failed. Fix these issues before claiming completion:\n%s" "$SECURITY_FAILURES")
                  continue
                fi

                echo "Security verifier PASSED"

                echo "Running main-pipeline.sh..."
                PIPELINE_OUTPUT=$(RUN_BUILD=1 bash scripts/verify/main-pipeline.sh 2>&1)
                PIPELINE_EXIT=$?
                echo "$PIPELINE_OUTPUT"
                if echo "$PIPELINE_OUTPUT" | grep -q "MAIN_PIPELINE: FAIL"; then
                  FEEDBACK=$(printf "Main pipeline verifier failed:\n%s" "$PIPELINE_OUTPUT")
                  continue
                fi

                PASSED=1
                break
              fi
              popd >/dev/null
            else
              pushd "apps/$APP_NAME/$NEXT_VERSION" >/dev/null
              if bash ../../../worker/verify-build.sh > /tmp/mitosis-verify.log 2>&1; then
                PASSED=1
                popd >/dev/null
                echo "Verifier passed"
                break
              fi
              popd >/dev/null
            fi

            echo "Verifier failed on attempt $ATTEMPT"
            echo "=== Verifier output (last 80 lines) ==="
            tail -80 /tmp/mitosis-verify.log
            echo "=== End verifier output ==="

            # 分类失败原因，提供结构化反馈
            FAIL_TYPE="unknown"
            FAIL_DETAILS=""

            if grep -qi "TypeScript\|error TS\|vue-tsc" /tmp/mitosis-verify.log; then
              FAIL_TYPE="typescript"
              FAIL_DETAILS=$(grep -E "error TS[0-9]+|TypeScript error" /tmp/mitosis-verify.log | head -5)
            elif grep -qi "security\|token\|secret\|password" /tmp/mitosis-verify.log; then
              FAIL_TYPE="security"
              FAIL_DETAILS=$(grep -i "security\|token\|secret\|password" /tmp/mitosis-verify.log | head -5)
            elif grep -qi "Module not found\|Cannot find module" /tmp/mitosis-verify.log; then
              FAIL_TYPE="import"
              FAIL_DETAILS=$(grep -E "Module not found|Cannot find module" /tmp/mitosis-verify.log | head -5)
            elif grep -qi "Vite\|build" /tmp/mitosis-verify.log; then
              FAIL_TYPE="build"
              FAIL_DETAILS=$(grep -E "error|failed" /tmp/mitosis-verify.log | head -5)
            fi

            if [ "$IS_PLATFORM" = "true" ]; then
              if [ "$FAIL_TYPE" = "typescript" ]; then
                FEEDBACK=$(printf "TypeScript errors detected. Fix these before claiming completion:\n%s" "$FAIL_DETAILS")
              elif [ "$FAIL_TYPE" = "security" ]; then
                FEEDBACK=$(printf "Security issues detected. Fix these before claiming completion:\n%s" "$FAIL_DETAILS")
              elif [ "$FAIL_TYPE" = "import" ]; then
                FEEDBACK=$(printf "Module import errors detected. Check all import paths are correct:\n%s" "$FAIL_DETAILS")
              elif [ "$FAIL_TYPE" = "build" ]; then
                FEEDBACK=$(printf "Build errors detected. Fix these before claiming completion:\n%s" "$FAIL_DETAILS")
              else
                VERIFY_SUMMARY=$(tail -60 /tmp/mitosis-verify.log)
                FEEDBACK=$(printf "Previous verifier failed. Fix these issues before claiming completion:\n%s" "$VERIFY_SUMMARY")
              fi
            else
              VERIFY_SUMMARY=$(tail -60 /tmp/mitosis-verify.log)
              FEEDBACK=$(printf "Previous verifier failed. Fix these issues before claiming completion:\n%s" "$VERIFY_SUMMARY")
            fi
          done

          if [ "$PASSED" -ne 1 ]; then
            set_status "status:failed" "❌ 状态：验证失败。Agent Loop 已重试 3 次仍未通过 verifier，请查看 Actions 日志。"
            echo "Agent Loop failed after 3 verifier attempts"
            exit 1
          fi

          if [ "$IS_PLATFORM" = "true" ]; then
            set_status "status:review" "✅ 状态：平台验证通过，等待人工审查。下一步会创建审查 PR；合入 master 后部署。"
          else
            set_status "status:review" "✅ 状态：验证通过，等待人工审查。下一步会创建审查 PR；合入 master 后由部署 workflow 发布。"
          fi

      - name: Commit and create review PR
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        id: review_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ steps.auth.outputs.issue_number }}
          IS_PLATFORM: ${{ steps.parse.outputs.is_platform }}
        run: |
          # 确保在 git 仓库根目录（agent watchdog 可能影响工作目录状态）
          REPO_DIR="$GITHUB_WORKSPACE"
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "::warning::.git not found in $REPO_DIR, re-cloning"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" /tmp/mitosis-repo
            REPO_DIR="/tmp/mitosis-repo"
          fi
          cd "$REPO_DIR"
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"
          if [ "$IS_PLATFORM" = "true" ]; then
            BRANCH="mitosis-platform-issue-$ISSUE_NUMBER-run-${{ github.run_attempt }}"
          else
            BRANCH="mitosis/$APP_NAME-$NEXT_VERSION-issue-$ISSUE_NUMBER-run-${{ github.run_attempt }}"
          fi

          if [ "$IS_PLATFORM" = "true" ]; then
            # 平台构建：agent 在 loop 中提交变更到 master，在此创建 branch 并 push
            git checkout -B "$BRANCH"
            git push --force-with-lease -u origin "$BRANCH"
          else
            # 应用构建：从干净状态提交应用目录
            git checkout -B "$BRANCH"
            git checkout -- .
            git add "apps/$APP_NAME/$NEXT_VERSION/"
            # Commit only if there are staged changes
            if git diff --cached --quiet; then
              gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:review" >/dev/null 2>&1 || true
              gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "status:failed"
              gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "❌ 验证通过但没有可提交的变更，未创建 PR。"
              exit 1
            fi
            git commit -m "feat: build $APP_NAME $NEXT_VERSION (issue #$ISSUE_NUMBER)"
            git push --force-with-lease -u origin "$BRANCH"
          fi

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_PATH="${{ github.repository }}"
          # Close any existing PR for this branch (from previous failed runs)
          EXISTING_PR=$(gh api \
            repos/$REPO_PATH/pulls?head=$REPO_OWNER:$BRANCH\&state=open \
            --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Closing existing PR #$EXISTING_PR for branch $BRANCH"
            gh api \
              repos/$REPO_PATH/pulls/$EXISTING_PR \
              -X PATCH \
              -f state=closed >/dev/null 2>&1 || true
          fi

          if [ "$IS_PLATFORM" = "true" ]; then
            printf '%s\n' '## Summary' "- Platform changes from Issue #$ISSUE_NUMBER." "- Agent Loop verifier passed before this PR was created." "- Merge to \`master\` to deploy platform changes." '' '## Review' "- [ ] Review all platform file changes." "- [ ] Confirm the changes satisfy the Issue requirements." "- [ ] Confirm no unintended changes were made." > /tmp/mitosis-pr-body.md

            PR_URL=$(gh pr create \
              --repo "$REPO_PATH" \
              --title "feat: platform changes (issue #$ISSUE_NUMBER)" \
              --head "$BRANCH" \
              --base "master" \
              --draft \
              --body "$(cat /tmp/mitosis-pr-body.md)" 2>/dev/null || true)
            if [ -z "$PR_URL" ]; then
              PR_URL="https://github.com/$REPO_PATH/compare/master...$BRANCH"
              FALLBACK_NOTE="⚠️ 自动创建 PR 失败（可能是 GITHUB_TOKEN 权限限制），请点击上方链接手动创建审查 PR。"
            fi
          else
            printf '%s\n' '## Summary' "- Builds \`$APP_NAME\` \`$NEXT_VERSION\` from Issue #$ISSUE_NUMBER." "- Agent Loop verifier passed before this PR was created." "- Merge to \`master\` to publish through the deploy workflow." '' '## Review' "- [ ] Open and inspect the generated app after deployment." "- [ ] Confirm the app satisfies the Issue requirements." "- [ ] Confirm the app includes the Mitosis iteration entry." > /tmp/mitosis-pr-body.md

            PR_URL=$(gh pr create \
              --repo "$REPO_PATH" \
              --title "feat: build $APP_NAME $NEXT_VERSION" \
              --head "$BRANCH" \
              --base "master" \
              --draft \
              --body "$(cat /tmp/mitosis-pr-body.md)" 2>/dev/null || true)
            if [ -z "$PR_URL" ]; then
              PR_URL="https://github.com/$REPO_PATH/compare/master...$BRANCH"
              FALLBACK_NOTE="⚠️ 自动创建 PR 失败（可能是 GITHUB_TOKEN 权限限制），请点击上方链接手动创建审查 PR。"
            fi
          fi

          if [ -z "$PR_URL" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:review" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "status:failed"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "❌ PR 创建失败，请查看 Actions 日志。"
            exit 1
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment review handoff
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ steps.auth.outputs.issue_number }}
          PR_URL: ${{ steps.review_pr.outputs.pr_url }}
          IS_PLATFORM: ${{ steps.parse.outputs.is_platform }}
          FALLBACK_NOTE: ${{ steps.review_pr.outputs.fallback_note }}
        run: |
          if [ "$IS_PLATFORM" = "true" ]; then
            if [ -n "$FALLBACK_NOTE" ]; then
              gh issue comment "$ISSUE_NUMBER" \
                --repo ${{ github.repository }} \
                --body "$FALLBACK_NOTE\n\nPR: $PR_URL\n\n合入 master 后，平台变更将自动部署。"
            else
              gh issue comment "$ISSUE_NUMBER" \
                --repo ${{ github.repository }} \
                --body "🧪 平台变更已通过自动验证，进入人工审查。\n\nPR: $PR_URL\n\n合入 master 后，平台变更将自动部署。"
            fi
          else
            if [ -n "$FALLBACK_NOTE" ]; then
              gh issue comment "$ISSUE_NUMBER" \
                --repo ${{ github.repository }} \
                --body "$FALLBACK_NOTE\n\nPR: $PR_URL\n\n合入 master 后，部署 workflow 会发布到 https://mitosis.zenheart.site/apps/$APP_NAME/$NEXT_VERSION/"
            else
              gh issue comment "$ISSUE_NUMBER" \
                --repo ${{ github.repository }} \
                --body "🧪 $APP_NAME $NEXT_VERSION 已通过自动验证，进入人工审查。\n\nPR: $PR_URL\n\n合入 master 后，部署 workflow 会发布到 https://mitosis.zenheart.site/apps/$APP_NAME/$NEXT_VERSION/"
            fi
          fi
