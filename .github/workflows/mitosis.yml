name: Mitosis Build

on:
  push:
    branches: [master]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Parse app name and version
        id: parse
        env:
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" == "push" ]; then
            echo "app_name=unknown" >> $GITHUB_OUTPUT
            echo "version=v0" >> $GITHUB_OUTPUT
            echo "Skipping: push event"
            exit 0
          fi

          # For issue_comment events, require /build command
          if [ "$EVENT" == "issue_comment" ]; then
            if ! echo "$COMMENT_BODY" | grep -qi '/build'; then
              echo "app_name=unknown" >> $GITHUB_OUTPUT
              echo "version=v0" >> $GITHUB_OUTPUT
              echo "Skipping: no /build command in comment"
              exit 0
            fi
          fi

          # Determine app name from labels or issue title
          if [ "$ISSUE_NUMBER" != "" ] && [ "$ISSUE_LABELS" != "" ]; then
            APP_NAME=$(echo "$ISSUE_LABELS" | grep -oP 'app/\K[^"]+' | head -1)
            if [ -z "$APP_NAME" ]; then
              APP_NAME=$(echo "$ISSUE_TITLE" | sed 's/build: //; s/ v.*//')
            fi
          else
            APP_NAME="unknown"
          fi
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

          EXISTING=$(ls apps/$APP_NAME/ 2>/dev/null | grep -c '^v' || echo "0")
          if [ "$EXISTING" -eq 0 ]; then
            NEXT_VERSION="v0"
          else
            NEXT=$(($(ls apps/$APP_NAME/ | grep '^v' | sed 's/v//' | sort -n | tail -1) + 1))
            NEXT_VERSION="v$NEXT"
          fi
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Run Agent Loop
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.STEP_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.stepfun.com/step_plan
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PROMPT=$(sed \
            -e "s/__APP_NAME__/${{ steps.parse.outputs.app_name }}/g" \
            -e "s/__NEXT_VERSION__/${{ steps.parse.outputs.version }}/g" \
            -e "s/__ISSUE_NUMBER__/${{ github.event.issue.number }}/g" \
            worker/prompt.txt)
          claude -p \
            --model step-3.7-flash \
            --allowed-tools "Read,Write,Edit,Bash" \
            --max-turns 80 \
            --output-format text \
            "$PROMPT"

      - name: Commit and push
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"
          cd apps/$APP_NAME/$NEXT_VERSION
          git init
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"
          git add -A
          # Commit only if there are staged changes (agent may or may not have committed)
          if ! git diff --cached --quiet; then
            git commit -m "feat: build $APP_NAME $NEXT_VERSION (issue #${{ github.event.issue.number }})"
          fi
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git 2>/dev/null || true
          git fetch origin
          git rebase origin/master
          git push -u origin master

      - name: Deploy to GitHub Pages
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"

          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            /tmp/gh-pages

          # Create app version directory and copy built artifacts
          mkdir -p /tmp/gh-pages/apps/$APP_NAME/$NEXT_VERSION
          cp -r apps/$APP_NAME/$NEXT_VERSION/dist/* /tmp/gh-pages/apps/$APP_NAME/$NEXT_VERSION/

          cd /tmp/gh-pages
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: $APP_NAME $NEXT_VERSION (issue #${{ github.event.issue.number }})"
          git push origin gh-pages

      - name: Close issue
        if: ${{ github.event_name == 'issues' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "✅ ${{ steps.parse.outputs.app_name }} ${{ steps.parse.outputs.version }} 构建完成！\n\n访问: https://mitosis.zenheart.site/apps/${{ steps.parse.outputs.app_name }}/"
