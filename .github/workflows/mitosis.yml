name: Mitosis Build

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Authorize IssueOps request
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          AUTHORIZED=false
          NEEDS_APPROVAL=false
          REASON=""

          if [ "$EVENT_NAME" = "issue_comment" ] && ! echo "$COMMENT_BODY" | grep -qi '/build'; then
            REASON="Comment does not contain /build."
          elif [ "$EVENT_NAME" = "issues" ] && [ "$ISSUE_AUTHOR" = "$REPO_OWNER" ] && { [ "$EVENT_ACTION" = "opened" ] || [ "$ACTOR" = "$REPO_OWNER" ]; }; then
            AUTHORIZED=true
            REASON="Issue was created by repository owner."
          elif [ "$EVENT_NAME" = "issue_comment" ] && [ "$ACTOR" = "$REPO_OWNER" ] && echo "$COMMENT_BODY" | grep -qi '/build'; then
            AUTHORIZED=true
            REASON="Repository owner approved with /build."
          elif [ "$EVENT_NAME" = "issues" ] && [ "$EVENT_ACTION" = "labeled" ] && [ "$LABEL_NAME" = "owner-approved" ] && [ "$ACTOR" = "$REPO_OWNER" ]; then
            AUTHORIZED=true
            REASON="Repository owner applied owner-approved label."
          else
            NEEDS_APPROVAL=true
            REASON="External IssueOps request requires repository owner approval."
          fi

          echo "authorized=$AUTHORIZED" >> "$GITHUB_OUTPUT"
          echo "needs_approval=$NEEDS_APPROVAL" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          if [ "$NEEDS_APPROVAL" = "true" ] && [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "🔒 Mitosis did not run the Agent Loop. External issues or comments require repository owner approval. The owner can approve by commenting \`/build\` or applying the \`owner-approved\` label with an \`app/{name}\` label."
          else
            echo "$REASON"
          fi

          # ── 去重检查：如果 issue 已有 status:building label，跳过 ──
          if [ "$AUTHORIZED" = "true" ] && [ -n "$ISSUE_NUMBER" ]; then
            if gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null | grep -q '^status:building$'; then
              echo "dedup_skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=Build already in progress (status:building label exists). Skipping duplicate /build."
            else
              echo "dedup_skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "dedup_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Parse app name and version
        if: ${{ steps.auth.outputs.authorized == 'true' && steps.auth.outputs.dedup_skip != 'true' }}
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          APP_NAME=$(echo "$ISSUE_LABELS" | grep -oP 'app/\K[a-z0-9-]+' | head -1 || true)
          if [ -z "$APP_NAME" ]; then
            echo "app_name=unknown" >> "$GITHUB_OUTPUT"
            echo "version=v0" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "⚠️ Mitosis did not start a build because this issue has no \`app/{name}\` label. Add an explicit app label before approving or running \`/build\`."
            exit 0
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

          LATEST=$(find "apps/$APP_NAME" -maxdepth 1 -type d -name 'v[0-9]*' 2>/dev/null | sed 's#.*/v##' | sort -n | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT_VERSION="v0"
          else
            NEXT=$((LATEST + 1))
            NEXT_VERSION="v$NEXT"
          fi
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run Agent Loop
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.STEP_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.stepfun.com/step_plan
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ensure_label() {
            gh label create "$1" --repo "${{ github.repository }}" --color "$2" --description "$3" --force >/dev/null 2>&1 || true
          }

          ensure_label "status:building" "1f6feb" "Mitosis Agent Loop is building"
          ensure_label "status:verifying" "fbca04" "Mitosis verifier is running"
          ensure_label "status:review" "0e8a16" "Human review required"
          ensure_label "status:failed" "b60205" "Mitosis Agent Loop failed"
          ensure_label "owner-approved" "5319e7" "Repository owner approved external request"

          set_status() {
            STATUS_LABEL="$1"
            MESSAGE="$2"
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:building" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:verifying" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:review" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:failed" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_LABEL"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "$MESSAGE"
          }

          set_status "status:building" "🔨 状态：构建中。Mitosis 正在根据 Issue 规格生成 $APP_NAME $NEXT_VERSION。"

          BASE_PROMPT=$(sed \
            -e "s/__APP_NAME__/${{ steps.parse.outputs.app_name }}/g" \
            -e "s/__NEXT_VERSION__/${{ steps.parse.outputs.version }}/g" \
            -e "s/__ISSUE_NUMBER__/${{ github.event.issue.number }}/g" \
            worker/prompt.txt)

          FEEDBACK=""
          PASSED=0

          for ATTEMPT in 1 2 3; do
            echo "Agent attempt $ATTEMPT/3"
            PROMPT_FILE="/tmp/mitosis-prompt-$ATTEMPT.txt"
            printf "%s\n\n%s\n" "$BASE_PROMPT" "$FEEDBACK" > "$PROMPT_FILE"

            if ! claude -p \
              --model step-3.7-flash \
              --bare \
              --permission-mode bypassPermissions \
              --max-budget-usd 5 \
              --allowed-tools "Read,Write,Edit,Bash" \
              --max-turns 80 \
              --output-format text \
              "$(cat "$PROMPT_FILE")"; then
              FEEDBACK="Previous Claude Code run failed before verification. Re-read the Issue and produce a valid app in apps/$APP_NAME/$NEXT_VERSION before stopping."
              continue
            fi

            if [ ! -d "apps/$APP_NAME/$NEXT_VERSION" ]; then
              FEEDBACK="Previous verifier failed: apps/$APP_NAME/$NEXT_VERSION was not created. Create that exact directory and all required files."
              continue
            fi

            set_status "status:verifying" "🔎 状态：验证中。正在运行 verifier（attempt $ATTEMPT/3），通过前不会创建审查 PR。"

            pushd "apps/$APP_NAME/$NEXT_VERSION" >/dev/null
            if bash ../../../worker/verify-build.sh > /tmp/mitosis-verify.log 2>&1; then
              PASSED=1
              popd >/dev/null
              echo "Verifier passed"
              break
            fi
            popd >/dev/null

            echo "Verifier failed on attempt $ATTEMPT"
            tail -80 /tmp/mitosis-verify.log
            VERIFY_SUMMARY=$(tail -60 /tmp/mitosis-verify.log)
            FEEDBACK=$(printf "Previous verifier failed. Fix these issues before claiming completion:\n%s" "$VERIFY_SUMMARY")
          done

          if [ "$PASSED" -ne 1 ]; then
            set_status "status:failed" "❌ 状态：验证失败。Agent Loop 已重试 3 次仍未通过 verifier，请查看 Actions 日志。"
            echo "Agent Loop failed after 3 verifier attempts"
            exit 1
          fi

          set_status "status:review" "✅ 状态：验证通过，等待人工审查。下一步会创建审查 PR；合入 master 后由部署 workflow 发布。"

      - name: Commit and create review PR
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        id: review_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "mitosis-bot"
          git config user.email "mitosis@users.noreply.github.com"
          BRANCH="mitosis/$APP_NAME-$NEXT_VERSION-issue-$ISSUE_NUMBER-run-${{ github.run_attempt }}"
          git checkout -B "$BRANCH"

          # Discard any unintended root-level changes from agent
          git checkout -- .
          # Only stage the new app version directory
          git add "apps/$APP_NAME/$NEXT_VERSION/"
          # Commit only if there are staged changes
          if git diff --cached --quiet; then
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "status:review" >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "status:failed"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "❌ 验证通过但没有可提交的应用变更，未创建 PR。"
            exit 1
          fi

          git commit -m "feat: build $APP_NAME $NEXT_VERSION (issue #$ISSUE_NUMBER)"
          git push -u origin "$BRANCH"

          cat > /tmp/mitosis-pr-body.md <<EOF
          ## Summary
          - Builds \`$APP_NAME\` \`$NEXT_VERSION\` from Issue #$ISSUE_NUMBER.
          - Agent Loop verifier passed before this PR was created.
          - Merge to \`master\` to publish through the deploy workflow.

          ## Review
          - [ ] Open and inspect the generated app after deployment.
          - [ ] Confirm the app satisfies the Issue requirements.
          - [ ] Confirm the app includes the Mitosis iteration entry.
          EOF

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base master \
            --head "$BRANCH" \
            --title "feat: build $APP_NAME $NEXT_VERSION" \
            --body-file /tmp/mitosis-pr-body.md \
            --draft)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment review handoff
        if: ${{ steps.parse.outputs.app_name != 'unknown' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ steps.parse.outputs.app_name }}
          NEXT_VERSION: ${{ steps.parse.outputs.version }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.review_pr.outputs.pr_url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo ${{ github.repository }} \
            --body "🧪 $APP_NAME $NEXT_VERSION 已通过自动验证，进入人工审查。\n\nPR: $PR_URL\n\n合入 master 后，部署 workflow 会发布到 https://mitosis.zenheart.site/apps/$APP_NAME/$NEXT_VERSION/"
