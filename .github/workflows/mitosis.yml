name: Mitosis Build

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to build from
        required: true
        type: number

# Deny by default. Each job receives only the GitHub capability it needs.
permissions:
  contents: read

concurrency:
  group: mitosis-issue-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

env:
  CLAUDE_VERSION: 2.1.207
  STEP_MODEL: step-3.7-flash
  CANDIDATE_ARTIFACT: mitosis-candidate-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  authorize:
    name: Authorize owner request
    # This repository is owner-operated. Non-owner events never reach a runner.
    if: >-
      github.actor == github.repository_owner &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request == null))
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    outputs:
      authorized: ${{ steps.request.outputs.authorized }}
      issue_number: ${{ steps.request.outputs.issue_number }}
      base_sha: ${{ steps.base.outputs.base_sha }}
      base_branch: ${{ steps.base.outputs.base_branch }}
    steps:
      - name: Validate command without logging comment content
        id: request
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require 'json'

          event = JSON.parse(File.read(ENV.fetch('GITHUB_EVENT_PATH')))
          authorized = false
          issue_number = nil

          case ENV.fetch('EVENT_NAME')
          when 'issue_comment'
            body = event.dig('comment', 'body').to_s
            issue_number = event.dig('issue', 'number')
            authorized = body.strip == '/create'
          when 'workflow_dispatch'
            raw = ENV.fetch('INPUT_ISSUE_NUMBER', '')
            issue_number = Integer(raw, 10)
            authorized = true
          end

          unless issue_number.is_a?(Integer) && issue_number.positive?
            abort 'Invalid issue number.'
          end

          File.open(ENV.fetch('GITHUB_OUTPUT'), 'a', 0o600) do |file|
            file.puts "authorized=#{authorized}"
            file.puts "issue_number=#{issue_number}"
          end
          RUBY

      - name: Checkout immutable default-branch base
        if: steps.request.outputs.authorized == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Record immutable base
        if: steps.request.outputs.authorized == 'true'
        id: base
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          base_sha=$(git rev-parse HEAD)
          [[ "$base_sha" =~ ^[0-9a-f]{40}$ ]]
          {
            printf 'base_sha=%s\n' "$base_sha"
            printf 'base_branch=%s\n' "$DEFAULT_BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Mark authorized request as building
        if: steps.request.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh label create status:building --repo "$REPOSITORY" --color 1f6feb --description 'Mitosis candidate generation is running' --force >/dev/null
          gh label create status:verifying --repo "$REPOSITORY" --color fbca04 --description 'Mitosis independent verification is running' --force >/dev/null
          gh label create status:review --repo "$REPOSITORY" --color 0e8a16 --description 'Human review is required' --force >/dev/null
          gh label create status:failed --repo "$REPOSITORY" --color b60205 --description 'Mitosis build failed closed' --force >/dev/null
          for label in status:verifying status:review status:failed; do
            gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --remove-label "$label" >/dev/null 2>&1 || true
          done
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label status:building >/dev/null

  agent:
    name: Generate constrained candidate patch
    needs: authorize
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      issues: read
    outputs:
      kind: ${{ steps.package.outputs.kind }}
      app_name: ${{ steps.package.outputs.app_name }}
      version: ${{ steps.package.outputs.version }}
    steps:
      - name: Checkout exact authorized base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Enforce Step Plan-only provider endpoints before exposing STEP_TOKEN
        shell: bash
        run: bash scripts/verify/step-plan-endpoints.sh

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install pinned Claude Code and sandbox prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bubblewrap socat
          if [[ $(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || printf '0') == 1 ]]; then
            sudo tee /etc/apparmor.d/bwrap >/dev/null <<'APPARMOR'
          abi <abi/4.0>,
          include <tunables/global>

          profile bwrap /usr/bin/bwrap flags=(unconfined) {
            userns,
            include if exists <local/bwrap>
          }
          APPARMOR
            sudo apparmor_parser -r /etc/apparmor.d/bwrap
          fi
          bwrap --ro-bind / / --dev /dev --proc /proc --unshare-user --unshare-pid --die-with-parent /bin/true
          npm install --global "@anthropic-ai/claude-code@$CLAUDE_VERSION"
          installed=$(claude --version | awk '{print $1}')
          test "$installed" = "$CLAUDE_VERSION"

      - name: Install root-owned CI policy
        shell: bash
        run: |
          set -euo pipefail
          sudo install -d -o root -g root -m 0755 /opt/mitosis-ci
          sudo install -o root -g root -m 0444 .github/claude-ci-settings.json /opt/mitosis-ci/settings.json
          sudo install -o root -g root -m 0444 worker/ci-system-prompt.txt /opt/mitosis-ci/system-prompt.txt
          sudo install -o root -g root -m 0555 worker/ci-artifact.rb /opt/mitosis-ci/ci-artifact.rb
          # Claude Code 2.x requires the MCP root object to contain mcpServers,
          # even when the allow-list is intentionally empty.
          printf '{"mcpServers":{}}\n' | sudo tee /opt/mitosis-ci/empty-mcp.json >/dev/null
          sudo chown root:root /opt/mitosis-ci/empty-mcp.json
          sudo chmod 0444 /opt/mitosis-ci/empty-mcp.json

      - name: Fetch issue into protected file
        env:
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          issue_tmp="$RUNNER_TEMP/issue.json"
          [[ "$REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          [[ "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]]
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            --header 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/$REPOSITORY/issues/$ISSUE_NUMBER" \
            > "$issue_tmp"
          sudo install -o root -g root -m 0444 "$issue_tmp" /opt/mitosis-ci/issue.json
          rm -f "$issue_tmp"

      - name: Prepare request and root-owned filesystem boundary
        id: prepare
        env:
          BASE_SHA: ${{ needs.authorize.outputs.base_sha }}
          BASE_BRANCH: ${{ needs.authorize.outputs.base_branch }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          sudo ruby /opt/mitosis-ci/ci-artifact.rb prepare \
            --workspace "$GITHUB_WORKSPACE" \
            --base-sha "$BASE_SHA" \
            --base-branch "$BASE_BRANCH" \
            --repository "$REPOSITORY" \
            --issue-number "$ISSUE_NUMBER" \
            --issue-json /opt/mitosis-ci/issue.json \
            --metadata /opt/mitosis-ci/request-metadata.json \
            --plan-prompt /opt/mitosis-ci/plan-prompt.txt

          if ! id mitosis-agent >/dev/null 2>&1; then
            sudo useradd --create-home --shell /usr/sbin/nologin mitosis-agent
          fi
          sudo chown -R root:root "$GITHUB_WORKSPACE"
          sudo chmod -R go-w "$GITHUB_WORKSPACE"
          sudo ruby /opt/mitosis-ci/ci-artifact.rb grant \
            --workspace "$GITHUB_WORKSPACE" \
            --metadata /opt/mitosis-ci/request-metadata.json \
            --user mitosis-agent \
            --group mitosis-agent
          sudo install -d -o mitosis-agent -g mitosis-agent -m 0700 /home/mitosis-agent/.claude

      - name: StepPlan decomposition (no fallback)
        env:
          STEP_TOKEN: ${{ secrets.STEP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          PLAN_SCHEMA='{"type":"object","properties":{"tasks":{"type":"array","minItems":1,"maxItems":6,"items":{"type":"object","properties":{"title":{"type":"string","minLength":1,"maxLength":160},"detail":{"type":"string","minLength":1,"maxLength":1200},"verification":{"type":"string","minLength":1,"maxLength":500}},"required":["title","detail","verification"],"additionalProperties":false}},"complexity":{"type":"string","enum":["simple","complex"]}},"required":["tasks","complexity"],"additionalProperties":false}'

          # Claude appends /v1/messages to the base below, yielding the required
          # https://api.stepfun.com/step_plan/v1/messages endpoint.
          if ! sudo -u mitosis-agent env -i \
            HOME=/home/mitosis-agent \
            PATH="$PATH" \
            ANTHROPIC_API_KEY="$STEP_TOKEN" \
            ANTHROPIC_BASE_URL=https://api.stepfun.com/step_plan \
            CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=0 \
            CLAUDE_CODE_DISABLE_BACKGROUND_TASKS=1 \
            CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 \
            DISABLE_TELEMETRY=1 \
            DISABLE_ERROR_REPORTING=1 \
            claude --print \
              --bare \
              --disable-slash-commands \
              --no-session-persistence \
              --no-chrome \
              --strict-mcp-config \
              --mcp-config /opt/mitosis-ci/empty-mcp.json \
              --settings /opt/mitosis-ci/settings.json \
              --system-prompt-file /opt/mitosis-ci/system-prompt.txt \
              --model "$STEP_MODEL" \
              --effort high \
              --permission-mode dontAsk \
              --tools "Read,Glob,Grep" \
              --allowedTools "Read,Glob,Grep" \
              --disallowed-tools "Bash,WebFetch,WebSearch,Task,Agent,Skill,NotebookEdit" \
              --max-turns 60 \
              --max-budget-usd 8 \
              --output-format json \
              --json-schema "$PLAN_SCHEMA" \
              < /opt/mitosis-ci/plan-prompt.txt \
              > "$RUNNER_TEMP/plan-result.json" \
              2> "$RUNNER_TEMP/plan-stderr.log"
          then
            echo 'StepPlan decomposition failed; sanitized provider diagnostics:' >&2
            sed -E 's/(sk-[A-Za-z0-9_-]+|Bearer[[:space:]]+[A-Za-z0-9._-]+)/[REDACTED]/g' "$RUNNER_TEMP/plan-stderr.log" >&2 || true
            if [[ -s "$RUNNER_TEMP/plan-result.json" ]]; then
              echo 'Claude structured result (sanitized):' >&2
              sed -E 's/(sk-[A-Za-z0-9_-]+|Bearer[[:space:]]+[A-Za-z0-9._-]+)/[REDACTED]/g' "$RUNNER_TEMP/plan-result.json" | head -c 4000 >&2 || true
              printf '\n' >&2
            fi
            exit 1
          fi

          sudo ruby /opt/mitosis-ci/ci-artifact.rb normalize-plan \
            --result "$RUNNER_TEMP/plan-result.json" \
            --output /opt/mitosis-ci/plan.json
          sudo ruby /opt/mitosis-ci/ci-artifact.rb execution-prompt \
            --issue-json /opt/mitosis-ci/issue.json \
            --metadata /opt/mitosis-ci/request-metadata.json \
            --plan /opt/mitosis-ci/plan.json \
            --output /opt/mitosis-ci/execution-prompt.txt
          rm -f "$RUNNER_TEMP/plan-result.json" "$RUNNER_TEMP/plan-stderr.log"

      - name: Generate candidate without shell, web, MCP, agents, or skills
        env:
          STEP_TOKEN: ${{ secrets.STEP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          # Claude appends /v1/messages to the base below, yielding the required
          # https://api.stepfun.com/step_plan/v1/messages endpoint.
          if ! sudo -u mitosis-agent env -i \
            HOME=/home/mitosis-agent \
            PATH="$PATH" \
            ANTHROPIC_API_KEY="$STEP_TOKEN" \
            ANTHROPIC_BASE_URL=https://api.stepfun.com/step_plan \
            CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=0 \
            CLAUDE_CODE_DISABLE_BACKGROUND_TASKS=1 \
            CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 \
            DISABLE_TELEMETRY=1 \
            DISABLE_ERROR_REPORTING=1 \
            claude --print \
              --bare \
              --disable-slash-commands \
              --no-session-persistence \
              --no-chrome \
              --strict-mcp-config \
              --mcp-config /opt/mitosis-ci/empty-mcp.json \
              --settings /opt/mitosis-ci/settings.json \
              --system-prompt-file /opt/mitosis-ci/system-prompt.txt \
              --model "$STEP_MODEL" \
              --effort high \
              --permission-mode acceptEdits \
              --tools "Read,Write,Edit,Glob,Grep" \
              --allowedTools "Read,Write,Edit,Glob,Grep" \
              --disallowed-tools "Bash,WebFetch,WebSearch,Task,Agent,Skill,NotebookEdit" \
              --max-turns 100 \
              --max-budget-usd 50 \
              --output-format json \
              < /opt/mitosis-ci/execution-prompt.txt \
              > "$RUNNER_TEMP/execution-result.json" \
              2> "$RUNNER_TEMP/execution-stderr.log"
          then
            echo 'Candidate generation failed; sanitized provider diagnostics:' >&2
            sed -E 's/(sk-[A-Za-z0-9_-]+|Bearer[[:space:]]+[A-Za-z0-9._-]+)/[REDACTED]/g' "$RUNNER_TEMP/execution-stderr.log" >&2 || true
            if [[ -s "$RUNNER_TEMP/execution-result.json" ]]; then
              echo 'Claude structured result (sanitized):' >&2
              sed -E 's/(sk-[A-Za-z0-9_-]+|Bearer[[:space:]]+[A-Za-z0-9._-]+)/[REDACTED]/g' "$RUNNER_TEMP/execution-result.json" | head -c 6000 >&2 || true
              printf '\n' >&2
            fi
            exit 1
          fi

          if [[ -s "$RUNNER_TEMP/execution-result.json" ]]; then
            echo 'Claude execution metadata:'
            jq -c '{type,subtype,is_error,num_turns,stop_reason,permission_denials,terminal_reason}' "$RUNNER_TEMP/execution-result.json" || true
            echo 'Claude final result summary:'
            jq -r '.result // empty' "$RUNNER_TEMP/execution-result.json" | head -c 2000 || true
            printf '\n'
          fi

          sudo ruby /opt/mitosis-ci/ci-artifact.rb assert-result \
            --result "$RUNNER_TEMP/execution-result.json"
          rm -f "$RUNNER_TEMP/execution-result.json" "$RUNNER_TEMP/execution-stderr.log"

      - name: Secret-scan and package the only transferable files
        id: package
        env:
          BASE_SHA: ${{ needs.authorize.outputs.base_sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          sudo ruby /opt/mitosis-ci/ci-artifact.rb package \
            --workspace "$GITHUB_WORKSPACE" \
            --base-sha "$BASE_SHA" \
            --metadata /opt/mitosis-ci/request-metadata.json \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --output-dir "$RUNNER_TEMP/candidate"
          sudo ruby /opt/mitosis-ci/ci-artifact.rb emit-outputs \
            --manifest "$RUNNER_TEMP/candidate/candidate.manifest.json" \
            --github-output "$GITHUB_OUTPUT"
          sudo chown -R runner:runner "$RUNNER_TEMP/candidate"

      - name: Upload scanned patch, hash, and manifest only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: |
            ${{ runner.temp }}/candidate/candidate.patch
            ${{ runner.temp }}/candidate/candidate.patch.sha256
            ${{ runner.temp }}/candidate/candidate.manifest.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

  mark-verifying:
    name: Mark independent verification
    needs: [authorize, agent]
    if: needs.agent.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Move trusted status to verifying
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          for label in status:building status:review status:failed; do
            gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --remove-label "$label" >/dev/null 2>&1 || true
          done
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label status:verifying >/dev/null

  verify:
    name: Verify candidate from immutable base
    needs: [authorize, agent, mark-verifying]
    if: >-
      needs.authorize.outputs.authorized == 'true' &&
      needs.mark-verifying.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout exact base without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install and probe verifier network isolation
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends iproute2
          probe="mitosis-probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup_probe() {
            sudo ip netns delete "$probe" 2>/dev/null || true
          }
          trap cleanup_probe EXIT
          sudo ip netns add "$probe"
          sudo ip -n "$probe" link set lo up
          test "$(sudo ip -n "$probe" -o link show | wc -l | tr -d ' ')" = 1
          test -z "$(sudo ip -n "$probe" route show default)"
          sudo ip netns exec "$probe" ip route get 127.0.0.1 | grep -q 'dev lo'

      - name: Download exact candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: ${{ runner.temp }}/candidate

      - name: Preserve base-commit verifier and apply candidate fail-closed
        env:
          BASE_SHA: ${{ needs.authorize.outputs.base_sha }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0700 "$RUNNER_TEMP/base-verifier"
          git show "$BASE_SHA:worker/ci-artifact.rb" > "$RUNNER_TEMP/base-verifier/ci-artifact.rb"
          git show "$BASE_SHA:worker/ci-verify-candidate.sh" > "$RUNNER_TEMP/base-verifier/ci-verify-candidate.sh"
          chmod 0500 "$RUNNER_TEMP/base-verifier/ci-artifact.rb" "$RUNNER_TEMP/base-verifier/ci-verify-candidate.sh"
          ruby "$RUNNER_TEMP/base-verifier/ci-artifact.rb" apply \
            --workspace "$GITHUB_WORKSPACE" \
            --manifest "$RUNNER_TEMP/candidate/candidate.manifest.json" \
            --patch "$RUNNER_TEMP/candidate/candidate.patch" \
            --hash "$RUNNER_TEMP/candidate/candidate.patch.sha256" \
            --expected-base-sha "$BASE_SHA" \
            --expected-issue-number "$ISSUE_NUMBER" \
            --expected-repository "$REPOSITORY" \
            --expected-run-id "$RUN_ID" \
            --expected-run-attempt "$RUN_ATTEMPT"

      - name: Run base-commit verifier without StepFun or write token
        env:
          CANDIDATE_MANIFEST: ${{ runner.temp }}/candidate/candidate.manifest.json
          BASE_SHA: ${{ needs.authorize.outputs.base_sha }}
          BASE_ARTIFACT_HELPER: ${{ runner.temp }}/base-verifier/ci-artifact.rb
        shell: bash
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/base-verifier/ci-verify-candidate.sh" "$CANDIDATE_MANIFEST"

  publish:
    name: Publish verified draft PR
    needs: [authorize, agent, verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout exact verified base without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Download exact verified candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: ${{ runner.temp }}/candidate

      - name: Apply, commit, push, and require a real draft PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ needs.authorize.outputs.base_sha }}
          BASE_BRANCH: ${{ needs.authorize.outputs.base_branch }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          remote_base=$(gh api "/repos/$REPOSITORY/commits/$BASE_BRANCH" --jq .sha)
          if [[ "$remote_base" != "$BASE_SHA" ]]; then
            echo 'Default branch advanced after verification; refusing stale publish.' >&2
            exit 1
          fi
          git show "$BASE_SHA:worker/ci-artifact.rb" > "$RUNNER_TEMP/ci-artifact.rb"
          chmod 0500 "$RUNNER_TEMP/ci-artifact.rb"
          ruby "$RUNNER_TEMP/ci-artifact.rb" apply \
            --workspace "$GITHUB_WORKSPACE" \
            --manifest "$RUNNER_TEMP/candidate/candidate.manifest.json" \
            --patch "$RUNNER_TEMP/candidate/candidate.patch" \
            --hash "$RUNNER_TEMP/candidate/candidate.patch.sha256" \
            --expected-base-sha "$BASE_SHA" \
            --expected-issue-number "$ISSUE_NUMBER" \
            --expected-repository "$REPOSITORY" \
            --expected-run-id "$RUN_ID" \
            --expected-run-attempt "$RUN_ATTEMPT"

          branch="mitosis/issue-${ISSUE_NUMBER}-run-${RUN_ID}-${RUN_ATTEMPT}"
          export branch
          git switch -c "$branch"
          git config user.name mitosis-bot
          git config user.email mitosis-bot@users.noreply.github.com
          install -d -m 0700 "$RUNNER_TEMP/empty-hooks"
          git -c core.hooksPath="$RUNNER_TEMP/empty-hooks" commit --no-verify \
            -m "feat: verified Mitosis candidate for issue #$ISSUE_NUMBER"
          commit_sha=$(git rev-parse HEAD)
          export commit_sha

          gh auth setup-git
          git -c core.hooksPath="$RUNNER_TEMP/empty-hooks" push --no-verify --set-upstream origin "$branch"

          remote_base=$(gh api "/repos/$REPOSITORY/commits/$BASE_BRANCH" --jq .sha)
          if [[ "$remote_base" != "$BASE_SHA" ]]; then
            echo 'Default branch advanced during publication; refusing PR creation.' >&2
            exit 1
          fi

          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## Verification boundary

          - Source: Issue #$ISSUE_NUMBER
          - Immutable base: \`$BASE_SHA\`
          - Candidate patch SHA-256: \`$(cat "$RUNNER_TEMP/candidate/candidate.patch.sha256")\`
          - Generated by StepPlan without GitHub credentials or shell/network tools
          - Verified in a fresh, read-only-token job using base-commit verifiers

          Human review and an explicit merge are required.
          EOF

          if ! gh pr create \
            --repo "$REPOSITORY" \
            --base "$BASE_BRANCH" \
            --head "$branch" \
            --title "feat: verified candidate for issue #$ISSUE_NUMBER" \
            --body-file "$RUNNER_TEMP/pr-body.md" \
            --draft \
            > "$RUNNER_TEMP/pr-url.txt" \
            2> "$RUNNER_TEMP/pr-create.stderr"; then
            echo 'Draft PR creation failed.' >&2
            exit 1
          fi

          pr_url=$(tr -d '\r\n' < "$RUNNER_TEMP/pr-url.txt")
          gh pr view "$pr_url" \
            --repo "$REPOSITORY" \
            --json number,url,isDraft,state,headRefName,baseRefName,headRefOid \
            > "$RUNNER_TEMP/pr.json"

          ruby <<'RUBY'
          require 'json'
          pr = JSON.parse(File.read(ENV.fetch('RUNNER_TEMP') + '/pr.json'))
          checks = {
            'state is OPEN' => pr['state'] == 'OPEN',
            'PR is draft' => pr['isDraft'] == true,
            'head branch matches' => pr['headRefName'] == ENV.fetch('branch'),
            'base branch matches' => pr['baseRefName'] == ENV.fetch('BASE_BRANCH'),
            'head commit matches' => pr['headRefOid'] == ENV.fetch('commit_sha'),
            'URL is a pull request' => pr['url'].to_s.match?(%r{\Ahttps://github\.com/[^/]+/[^/]+/pull/\d+\z})
          }
          failed = checks.reject { |_name, passed| passed }.keys
          abort "Draft PR verification failed: #{failed.join(', ')}" unless failed.empty?
          File.write(ENV.fetch('GITHUB_STEP_SUMMARY'), "Verified draft PR: #{pr['url']}\n", mode: 'a')
          RUBY

          for label in status:building status:verifying status:failed; do
            gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --remove-label "$label" >/dev/null 2>&1 || true
          done
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label status:review >/dev/null
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
            --body "✅ 独立验证已通过，已创建待人工审查的 draft PR：$pr_url" >/dev/null

  failure-report:
    name: Mark failed-closed outcome
    needs: [authorize, agent, mark-verifying, verify, publish]
    if: >-
      always() &&
      needs.authorize.outputs.authorized == 'true' &&
      needs.publish.result != 'success'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Mark request failed without exposing model or Issue content
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          for label in status:building status:verifying status:review; do
            gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --remove-label "$label" >/dev/null 2>&1 || true
          done
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label status:failed >/dev/null
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
            --body "❌ Mitosis 本轮已失败关闭，未发布可合并结果。请由仓库 owner 审查 Actions 运行：$RUN_URL" >/dev/null
